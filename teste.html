<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
            font-size: 18px;
        }

        button {
            background-color: blue;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }
    </style>
</head>

<body>

    <h1>Olá, Mundo!</h1>

    <p>Essa é minha primeira página em HTML.</p>

    <button onclick="mostrarMensagem()">
        Clique Aqui
    </button>

    <script>
        function mostrarMensagem() {
            alert("Você clicou no botão!");
        }
    </script>

</body>
</html>
